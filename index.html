<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторная 11 — форма обратной связи</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
        background: #f4f6fb;
      }
      body {
        max-width: 28rem;
        margin: 2rem auto;
        padding: 1.5rem;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 1.35rem;
        margin-top: 0;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 0.35rem;
        padding: 0.5rem 0.65rem;
        border: 1px solid #cfd6e6;
        border-radius: 8px;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.55rem 1.25rem;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      #status-msg {
        margin-top: 1rem;
        color: #15803d;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1 id="page-title">Форма обратной связи</h1>
    <p id="page-intro">Оставьте контакты — мы ответим в рабочее время.</p>

    <form id="contact-form" novalidate>
      <label for="name">Имя</label>
      <input type="text" id="name" name="name" required placeholder="Введите имя" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="mail@example.com" />

      <button type="submit" id="submit-btn">Отправить сейчас</button>
    </form>

    <p id="status-msg" hidden>Сообщение отправлено (демо, без сервера).</p>

    <script>
      document.getElementById("contact-form").addEventListener("submit", function (e) {
        e.preventDefault();
        document.getElementById("status-msg").hidden = false;
      });
    </script>
  </body>
</html>
